<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#0a0e14"/>
  <!-- Terminal bracket prompt -->
  <text x="3" y="23" font-family="monospace" font-weight="bold" font-size="22" fill="#00ff41">&gt;_</text>
  <!-- Subtle scanline -->
  <line x1="0" y1="10" x2="32" y2="10" stroke="#00ff41" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="0" y1="20" x2="32" y2="20" stroke="#00ff41" stroke-opacity="0.08" stroke-width="1"/>
</svg>
