version: '3.8'

services:
  arena-copy-trader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arena-copy-trader
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    profiles:
      - cli

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: hl-trader-dashboard
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DASHBOARD_PORT=3001
    profiles:
      - dashboard
