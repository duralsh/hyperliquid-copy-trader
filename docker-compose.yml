version: '3.8'

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: hl-trader-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3002"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - .env
    environment:
      - NODE_ENV=production
